<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Đồng Hồ Đa Năng Pro Max v2</title>
    
    <style>
        /* --- 1. HỆ THỐNG PHỤC HỒI CSS TỰ ĐỘNG (AUTO-HEALING SYSTEM) --- */
        :root {
            --app-height: 100%;
            --primary-glow: rgba(0, 210, 255, 0.4);
            --bg-dark: #0a0a0a;
            --border-white: rgba(255, 255, 255, 0.1);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            -webkit-font-smoothing: antialiased;
            touch-action: manipulation;
        }

        /* Chống tràn cho toàn bộ trang web */
        html, body {
            width: 100vw;
            height: 100vh;
            height: -webkit-fill-available;
            overflow: hidden; 
            background: #000;
            position: fixed; /* Khóa chặt vị trí body */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1a1a2e 0%, #000 100%);
        }

        /* Hình nền động */
        .space-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2000') no-repeat center center;
            background-size: cover;
            filter: brightness(0.5) contrast(1.2);
            z-index: -1;
            transform: scale(1.1); /* Tạo cảm giác chiều sâu */
        }

        /* --- 2. KHUNG CHÍNH (CHỐNG TRÀN TUYỆT ĐỐI) --- */
        .app-shell {
            position: relative;
            width: 94vw;
            max-width: 420px;
            /* Tự động tính toán chiều cao để không bị che bởi thanh điều hướng điện thoại */
            height: calc(var(--app-height) - 40px);
            max-height: 700px;
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 40px;
            border: 1px solid var(--border-white);
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Cửa sổ cuối cùng chặn mọi sự tràn ra ngoài */
            box-shadow: 0 40px 100px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.02);
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
        }

        /* --- 3. NAVIGATION --- */
        .app-header {
            padding: 20px 20px 10px 20px;
            flex-shrink: 0;
        }

        .tab-nav {
            display: flex;
            background: rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 5px;
            gap: 5px;
        }

        .tab-link {
            flex: 1;
            padding: 14px 5px;
            border: none;
            background: transparent;
            color: #888;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tab-link.active {
            background: #00d2ff;
            color: #000;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0, 210, 255, 0.4);
        }

        /* --- 4. TRÌNH QUẢN LÝ SLIDE --- */
        .viewport {
            flex: 1;
            overflow: hidden;
            position: relative;
            width: 100%;
        }

        .canvas-slider {
            display: flex;
            width: 300%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .screen-unit {
            width: 33.33333%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 10px 25px;
            /* Đảm bảo nội dung bên trong cũng không được tràn */
            overflow-x: hidden;
            overflow-y: auto; 
        }

        /* --- 5. CHI TIẾT TỪNG TRANG --- */
        
        /* Đồng hồ */
        .tz-selector {
            width: 100%;
            padding: 16px;
            background: #222;
            color: #fff;
            border: 1px solid #333;
            border-radius: 18px;
            font-size: 14px;
            margin-bottom: 25px;
            outline: none;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

        .clock-display {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .main-time {
            font-size: 4.2rem;
            font-weight: 900;
            color: #fff;
            line-height: 1;
            margin-bottom: 10px;
            font-variant-numeric: tabular-nums;
            background: linear-gradient(to bottom, #fff, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px var(--primary-glow));
        }

        .main-date {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.7);
            margin-bottom: 20px;
            font-weight: 500;
        }

        .lunar-capsule {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.2);
            color: #ffd700;
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.95rem;
        }

        /* Bấm giờ / Hẹn giờ */
        .timer-face {
            width: 100%;
            height: 160px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3.5rem;
            color: #fff;
            font-family: 'Courier New', monospace;
            margin: 20px 0;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
        }

        .control-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
        }

        .action-btn {
            height: 65px;
            border-radius: 22px;
            border: none;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.3s;
        }

        .action-btn:active { transform: scale(0.95); opacity: 0.8; }
        
        .bg-cyan { background: #00d2ff; color: #000; }
        .bg-green { background: #00ff88; color: #000; }
        .bg-red { background: #ff4757; color: #fff; }
        .bg-white-low { background: rgba(255,255,255,0.1); color: #fff; }

        .lap-list {
            margin-top: 25px;
            width: 100%;
            flex: 1;
            overflow-y: auto;
        }

        .lap-card {
            background: rgba(255,255,255,0.03);
            padding: 12px 20px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            color: #bbb;
        }

        /* --- 6. PHẦN TRANG TRÍ RIÊNG CHO BẠN --- */
        .footer-badge {
            padding: 20px;
            text-align: center;
            font-size: 12px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 2px;
            flex-shrink: 0;
        }

    </style>
</head>
<body>

<div class="space-bg"></div>

<div class="app-shell">
    <header class="app-header">
        <nav class="tab-nav">
            <button class="tab-link active" onclick="jump(0)">Đồng hồ</button>
            <button class="tab-link" onclick="jump(1)">Bấm giờ</button>
            <button class="tab-link" onclick="jump(2)">Hẹn giờ</button>
        </nav>
    </header>

    <main class="viewport">
        <div class="canvas-slider" id="mainSlider">
            
            <section class="screen-unit">
                <select class="tz-selector" id="tzBox"></select>
                <div class="clock-display">
                    <div class="main-time" id="clockTxt">00:00:00</div>
                    <div class="main-date" id="dateTxt">--/--/----</div>
                    <div class="lunar-capsule" id="lunarTxt">Đang tải...</div>
                </div>
            </section>

            <section class="screen-unit">
                <div class="timer-face" id="swTxt">00:00.0</div>
                <div class="control-grid">
                    <button class="action-btn bg-green" id="swStart">BẮT ĐẦU</button>
                    <button class="action-btn bg-cyan" id="swLap">VÒNG</button>
                    <button class="action-btn bg-red" id="swReset" style="grid-column: span 2;">XÓA HẾT</button>
                </div>
                <div class="lap-list" id="swLaps"></div>
            </section>

            <section class="screen-unit">
                <div class="timer-face" id="tmTxt">00:00:00</div>
                <div class="control-grid" style="margin-bottom: 15px;">
                    <button class="action-btn bg-white-low" onclick="tmAdd(60)">+1 PHÚT</button>
                    <button class="action-btn bg-white-low" onclick="tmAdd(300)">+5 PHÚT</button>
                </div>
                <div class="control-grid">
                    <button class="action-btn bg-cyan" id="tmStart">BẮT ĐẦU</button>
                    <button class="action-btn bg-red" onclick="tmReset()">HỦY</button>
                </div>
            </section>

        </div>
    </main>

    <footer class="footer-badge">
        HCMC • JUNE 2026 TRIP AHEAD
    </footer>
</div>

<script>
    /* --- HỆ THỐNG FIX CHIỀU CAO CHO MOBILE --- */
    const updateAppHeight = () => {
        const doc = document.documentElement;
        doc.style.setProperty('--app-height', `${window.innerHeight}px`);
    };
    window.addEventListener('resize', updateAppHeight);
    updateAppHeight();

    /* --- DỮ LIỆU MÚI GIỜ --- */
    const timeZones = [
        { n: "UTC+07: Hà Nội, TP.HCM, Bangkok", v: "Asia/Ho_Chi_Minh" },
        { n: "UTC+08: Singapore, Bắc Kinh, Perth", v: "Asia/Singapore" },
        { n: "UTC+09: Tokyo, Seoul, Osaka", v: "Asia/Tokyo" },
        { n: "UTC+00: London, Dublin, Lisbon", v: "Europe/London" },
        { n: "UTC+01: Paris, Berlin, Rome, Madrid", v: "Europe/Paris" },
        { n: "UTC-05: New York, Toronto, Havana", v: "America/New_York" },
        { n: "UTC-08: LA, Vancouver, Tijuana", v: "America/Los_Angeles" },
        { n: "UTC+10: Sydney, Melbourne, Brisbane", v: "Australia/Sydney" },
        { n: "UTC+03: Moscow, Riyadh, Nairobi", v: "Europe/Moscow" },
        { n: "UTC+05: Karachi, Tashkent, Maldives", v: "Asia/Karachi" }
    ];

    const tzBox = document.getElementById('tzBox');
    timeZones.forEach(z => {
        const opt = document.createElement('option');
        opt.value = z.v; opt.textContent = z.n;
        if(z.v === "Asia/Ho_Chi_Minh") opt.selected = true;
        tzBox.appendChild(opt);
    });

    /* --- LOGIC ĐIỀU HƯỚNG --- */
    function jump(idx) {
        document.getElementById('mainSlider').style.transform = `translateX(-${idx * 33.33333}%)`;
        const navs = document.querySelectorAll('.tab-link');
        navs.forEach((n, i) => n.classList.toggle('active', i === idx));
    }

    /* --- LOGIC ĐỒNG HỒ --- */
    function refreshClock() {
        const tz = tzBox.value;
        const now = new Date();
        
        // Giờ chính xác từng giây
        const timeStr = new Intl.DateTimeFormat('vi-VN', {
            timeZone: tz, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
        }).format(now);
        document.getElementById('clockTxt').textContent = timeStr;

        // Ngày dương
        const dateParts = new Intl.DateTimeFormat('vi-VN', { 
            timeZone: tz, day: '2-digit', month: '2-digit', year: 'numeric' 
        }).formatToParts(now);
        document.getElementById('dateTxt').textContent = `${dateParts.find(x=>x.type==='day').value}/${dateParts.find(x=>x.type==='month').value}/${dateParts.find(x=>x.type==='year').value}`;

        // Âm lịch (Dựa trên Locale Trung Quốc/Việt Nam)
        const lunarStr = new Intl.DateTimeFormat('vi-VN-u-ca-chinese', { 
            timeZone: tz, day: '2-digit', month: '2-digit' 
        }).format(now);
        document.getElementById('lunarTxt').textContent = `Âm lịch: Ngày ${lunarStr.replace('/', ' tháng ')}`;
    }
    setInterval(refreshClock, 1000); refreshClock();

    /* --- BẤM GIỜ (STOPWATCH) --- */
    let swMs = 0, swRunner, isSwOn = false;
    const swTxt = document.getElementById('swTxt');
    const swStartBtn = document.getElementById('swStart');

    swStartBtn.onclick = function() {
        if(!isSwOn) {
            isSwOn = true; this.textContent = "DỪNG"; this.className = "action-btn bg-red";
            swRunner = setInterval(() => {
                swMs += 100;
                let s = swMs / 1000;
                let m = Math.floor(s / 60);
                swTxt.textContent = `${String(m).padStart(2,'0')}:${(s % 60).toFixed(1).padStart(4,'0')}`;
            }, 100);
        } else {
            isSwOn = false; this.textContent = "TIẾP TỤC"; this.className = "action-btn bg-green";
            clearInterval(swRunner);
        }
    };

    document.getElementById('swLap').onclick = () => {
        if(swMs > 0) {
            const card = document.createElement('div');
            card.className = 'lap-card';
            card.innerHTML = `<span>#${document.getElementById('swLaps').children.length + 1}</span> <b>${swTxt.textContent}</b>`;
            document.getElementById('swLaps').prepend(card);
        }
    };

    document.getElementById('swReset').onclick = () => {
        clearInterval(swRunner); swMs = 0; isSwOn = false;
        swTxt.textContent = "00:00.0";
        swStartBtn.textContent = "BẮT ĐẦU"; swStartBtn.className = "action-btn bg-green";
        document.getElementById('swLaps').innerHTML = "";
    };

    /* --- HẸN GIỜ (TIMER) --- */
    let tmSec = 0, tmRunner, isTmOn = false;
    const tmTxt = document.getElementById('tmTxt');

    window.tmAdd = (s) => {
        tmSec += s;
        updateTmDisplay();
    };

    function updateTmDisplay() {
        let h = Math.floor(tmSec / 3600);
        let m = Math.floor((tmSec % 3600) / 60);
        let s = tmSec % 60;
        tmTxt.textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    document.getElementById('tmStart').onclick = function() {
        if(tmSec <= 0) return;
        if(!isTmOn) {
            isTmOn = true; this.textContent = "TẠM DỪNG";
            tmRunner = setInterval(() => {
                tmSec--;
                updateTmDisplay();
                if(tmSec <= 0) {
                    clearInterval(tmRunner); isTmOn = false;
                    this.textContent = "BẮT ĐẦU"; alert("HẾT GIỜ!");
                }
            }, 1000);
        } else {
            isTmOn = false; this.textContent = "TIẾP TỤC";
            clearInterval(tmRunner);
        }
    };

    window.tmReset = () => {
        clearInterval(tmRunner); tmSec = 0; isTmOn = false;
        updateTmDisplay(); document.getElementById('tmStart').textContent = "BẮT ĐẦU";
    };

    // Tự động điều chỉnh kích thước khi load xong
    window.onload = updateAppHeight;

</script>
</body>
</html>
