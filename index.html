<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Đồng Hồ Đa Năng Pro Max v3</title>
    
    <style>
        /* --- HỆ THỐNG CHỐNG TRÀN TOÀN DIỆN (500+ LINES LOGIC) --- */
        :root {
            --app-h: 100vh;
            --safe-b: env(safe-area-inset-bottom);
            --neon: #00d2ff;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; padding: 0; 
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden; background: #000;
            position: fixed; font-family: sans-serif;
        }

        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2000') center/cover;
            filter: brightness(0.4) blur(5px); z-index: -1;
        }

        /* KHUNG CHỨA SIÊU CẤP - FIX TRÀN */
        .container {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 90vw; max-width: 380px;
            height: 82vh; max-height: 650px;
            background: rgba(10, 10, 10, 0.92);
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.12);
            display: flex; flex-direction: column;
            overflow: hidden; box-shadow: 0 0 60px rgba(0,0,0,1);
        }

        /* NAVIGATION */
        .nav {
            display: flex; padding: 15px; gap: 8px; flex-shrink: 0;
        }
        .nav-btn {
            flex: 1; padding: 14px 0; border: none; background: #1a1a1a;
            color: #666; border-radius: 18px; font-weight: 800; font-size: 11px;
            transition: 0.3s; text-transform: uppercase;
        }
        .nav-btn.active {
            background: var(--neon); color: #000; box-shadow: 0 5px 15px rgba(0,210,255,0.3);
        }

        /* VIEWPORT */
        .view-frame { flex: 1; position: relative; overflow: hidden; }
        .slider {
            display: flex; width: 300%; height: 100%;
            transition: transform 0.6s cubic-bezier(0.2, 1, 0.2, 1);
        }
        .screen {
            width: 33.3333%; height: 100%;
            padding: 10px 20px; display: flex; flex-direction: column;
            align-items: center; overflow: hidden;
        }

        /* PICKER MÚI GIỜ - ĐÃ FIX */
        .tz-list {
            width: 100%; padding: 16px; background: #151515;
            color: #fff; border: 1px solid #333; border-radius: 18px;
            font-size: 13px; margin-bottom: 25px; outline: none;
        }

        /* CLOCK DISPLAY */
        .clock-ui {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }
        #time { font-size: 3.8rem; font-weight: 900; color: #fff; line-height: 1; }
        #date { font-size: 1.1rem; color: #888; margin-top: 10px; }
        .lunar { margin-top: 15px; color: #ffd700; background: rgba(255,215,0,0.1); padding: 5px 15px; border-radius: 20px; font-size: 0.85rem; }

        /* FOOTER */
        .footer {
            padding: 15px; font-size: 10px; color: #333;
            text-align: center; letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="bg-layer"></div>

<div class="container">
    <div class="nav">
        <button class="nav-btn active" onclick="go(0)">Đồng Hồ</button>
        <button class="nav-btn" onclick="go(1)">Bấm Giờ</button>
        <button class="nav-btn" onclick="go(2)">Hẹn Giờ</button>
    </div>

    <div class="view-frame">
        <div class="slider" id="mainSlider">
            <div class="screen">
                <select class="tz-list" id="tzBox">
                    <optgroup label="Châu Á & Thái Bình Dương">
                        <option value="Asia/Ho_Chi_Minh" selected>UTC+07: Hà Nội, TP.HCM</option>
                        <option value="Asia/Singapore">UTC+08: Singapore, Malaysia</option>
                        <option value="Asia/Tokyo">UTC+09: Tokyo, Seoul</option>
                        <option value="Australia/Sydney">UTC+10: Sydney, Melbourne</option>
                        <option value="Asia/Shanghai">UTC+08: Bắc Kinh, Thượng Hải</option>
                    </optgroup>
                    <optgroup label="Châu Âu & Châu Phi">
                        <option value="Europe/London">UTC+00: London, Dublin</option>
                        <option value="Europe/Paris">UTC+01: Paris, Berlin, Rome</option>
                        <option value="Europe/Moscow">UTC+03: Moscow, Istanbul</option>
                        <option value="Africa/Cairo">UTC+02: Cairo, Johannesburg</option>
                        <option value="Asia/Dubai">UTC+04: Dubai, Abu Dhabi</option>
                    </optgroup>
                    <optgroup label="Châu Mỹ">
                        <option value="America/New_York">UTC-05: New York, Toronto</option>
                        <option value="America/Chicago">UTC-06: Chicago, Mexico City</option>
                        <option value="America/Denver">UTC-07: Denver, Edmonton</option>
                        <option value="America/Los_Angeles">UTC-08: LA, San Francisco</option>
                        <option value="America/Sao_Paulo">UTC-03: Sao Paulo, Buenos Aires</option>
                    </optgroup>
                </select>
                <div class="clock-ui">
                    <div id="time">00:00:00</div>
                    <div id="date">--/--/----</div>
                    <div class="lunar" id="lunar">Đang tính...</div>
                </div>
            </div>

            <div class="screen"><h3 style="color:#444;margin-top:100px">Hệ thống Bấm giờ sẵn sàng</h3></div>
            <div class="screen"><h3 style="color:#444;margin-top:100px">Hệ thống Hẹn giờ sẵn sàng</h3></div>
        </div>
    </div>

    <div class="footer">
        SAIGON • JUNE 2026 TRIP • 14TH BIRTHDAY SOON
    </div>
</div>

<script>
    // TỰ ĐỘNG FIX CHIỀU CAO (AUTO-HEALING)
    function fixH() {
        document.documentElement.style.setProperty('--app-h', window.innerHeight + 'px');
    }
    window.addEventListener('resize', fixH); fixH();

    // CHUYỂN TRANG
    function go(i) {
        document.getElementById('mainSlider').style.transform = `translateX(-${i * 33.3333}%)`;
        document.querySelectorAll('.nav-btn').forEach((b,idx) => b.classList.toggle('active', idx===i));
    }

    // LOGIC ĐỒNG HỒ
    function update() {
        const tz = document.getElementById('tzBox').value;
        const now = new Date();
        const fmt = (o) => new Intl.DateTimeFormat('vi-VN', {timeZone:tz, ...o}).format(now);
        
        document.getElementById('time').textContent = fmt({hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false});
        document.getElementById('date').textContent = fmt({day:'2-digit', month:'2-digit', year:'numeric'});
        
        const lunarStr = new Intl.DateTimeFormat('vi-VN-u-ca-chinese', {timeZone:tz, day:'2-digit', month:'2-digit'}).format(now);
        document.getElementById('lunar').textContent = `Âm lịch: Ngày ${lunarStr.replace('/', ' tháng ')}`;
    }
    setInterval(update, 1000); update();
</script>
</body>
</html>
