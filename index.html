<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Đồng Hồ Đa Năng Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        body {
            background: #000 url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2000') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            color: #fff; overflow: hidden;
        }

        /* Cố định khung chứa để không bị lỗi hiển thị như ảnh 1468 */
        .container {
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 20px;
            width: 92%; max-width: 400px;
            height: 520px; /* Cố định chiều cao để không bị nhảy khung */
            display: flex; flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .nav-tabs { display: flex; background: rgba(255,255,255,0.1); border-radius: 12px; margin-bottom: 20px; padding: 4px; flex-shrink: 0; }
        
        .tab-btn { 
            flex: 1; padding: 10px; border: none; background: none; 
            color: #888; cursor: pointer; font-weight: bold; font-size: 0.85rem;
        }
        
        .tab-btn.active { background: #00d2ff; color: #000; border-radius: 8px; }
        
        .slider-container { flex-grow: 1; overflow: hidden; }
        .slider-wrapper { display: flex; width: 300%; height: 100%; transition: transform 0.5s ease; }
        .section { width: 33.3333%; height: 100%; padding: 0 5px; display: flex; flex-direction: column; align-items: center; }

        /* Múi giờ & Đồng hồ */
        select {
            width: 100%; padding: 10px; margin-bottom: 15px;
            border-radius: 10px; background: #333; color: #fff;
            border: 1px solid #444; font-size: 0.8rem;
        }

        .time-main { font-size: 3.2rem; font-weight: bold; color: #00d2ff; margin: 10px 0; }
        .date-main { font-size: 1.2rem; margin-bottom: 8px; }
        .lunar-date { font-size: 1rem; color: #ffd700; background: rgba(255,215,0,0.1); padding: 4px 12px; border-radius: 15px; }

        /* Bấm giờ & Hẹn giờ */
        .display-box { 
            font-size: 2.5rem; margin: 20px 0; background: rgba(255,255,255,0.05); 
            width: 100%; padding: 20px 0; border-radius: 15px; font-family: monospace; 
        }
        
        .btn-group { display: flex; gap: 10px; width: 100%; justify-content: center; flex-wrap: wrap; }
        
        .action-btn { 
            padding: 12px 20px; border-radius: 12px; border: none; 
            background: #00d2ff; color: #000; font-weight: bold; cursor: pointer;
            min-width: 100px;
        }

        .lap-list {
            width: 100%; margin-top: 15px; overflow-y: auto;
            max-height: 100px; font-size: 0.8rem; text-align: left;
        }
        .lap-item { display: flex; justify-content: space-between; padding: 5px 10px; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab(0)">Đồng Hồ</button>
        <button class="tab-btn" onclick="switchTab(1)">Bấm Giờ</button>
        <button class="tab-btn" onclick="switchTab(2)">Hẹn Giờ</button>
    </div>

    <div class="slider-container">
        <div class="slider-wrapper" id="slider">
            <div class="section">
                <select id="tz-select"></select>
                <div class="time-main" id="current-time">00:00:00</div>
                <div class="date-main" id="solar-date">--/--/----</div>
                <div class="lunar-date" id="lunar-date">Đang tính...</div>
            </div>

            <div class="section">
                <div class="display-box" id="sw-display">00:00:00.0</div>
                <div class="btn-group">
                    <button class="action-btn" id="sw-start" style="background:#00ff88;">Bắt đầu</button>
                    <button class="action-btn" id="sw-reset" style="background:#ff4444; color:#fff;">Xóa</button>
                </div>
                <div class="lap-list" id="lap-list"></div>
            </div>

            <div class="section">
                <div class="display-box" id="tm-display">00:00:00</div>
                <div class="btn-group" style="margin-bottom:10px;">
                    <button class="action-btn" onclick="addTime(60)" style="background:#888; color:#fff;">+1 Phút</button>
                    <button class="action-btn" onclick="addTime(300)" style="background:#888; color:#fff;">+5 Phút</button>
                </div>
                <div class="btn-group">
                    <button class="action-btn" id="tm-start" style="background:#ffd700; width:70%;">Bắt đầu</button>
                    <button class="action-btn" onclick="resetTimer()" style="background:#ff4444; color:#fff;">Xóa</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const tzSelect = document.getElementById('tz-select');
    // Danh sách múi giờ từ -12 đến +12, mỗi dòng ít nhất 3 địa danh
    const tzs = [
        { n: "UTC-12: Baker, Howland, Phoenix Is.", v: "Etc/GMT+12" },
        { n: "UTC-11: Samoa, Niue, Midway, Pago Pago", v: "Pacific/Pago_Pago" },
        { n: "UTC-10: Hawaii, Tahiti, Cook Is., Honolulu", v: "Pacific/Honolulu" },
        { n: "UTC-09: Alaska, Gambier Is., Anchorage", v: "America/Anchorage" },
        { n: "UTC-08: Los Angeles, Vancouver, Tijuana, Seattle", v: "America/Los_Angeles" },
        { n: "UTC-07: Denver, Edmonton, Phoenix, Calgary", v: "America/Denver" },
        { n: "UTC-06: Mexico City, Chicago, Guatemala, Regina", v: "America/Mexico_City" },
        { n: "UTC-05: New York, Toronto, Havana, Bogota", v: "America/New_York" },
        { n: "UTC-04: Santiago, Manaus, Halifax, Barbados", v: "America/Santiago" },
        { n: "UTC-03: Sao Paulo, Buenos Aires, Greenland", v: "America/Sao_Paulo" },
        { n: "UTC-02: South Georgia, Sandwich Is., Fernando", v: "Etc/GMT+2" },
        { n: "UTC-01: Azores, Cape Verde, Praia", v: "Atlantic/Azores" },
        { n: "UTC+00: London, Dublin, Lisbon, Casablanca", v: "Europe/London" },
        { n: "UTC+01: Paris, Berlin, Rome, Madrid, Warsaw", v: "Europe/Paris" },
        { n: "UTC+02: Cairo, Athens, Johannesburg, Kyiv", v: "Africa/Cairo" },
        { n: "UTC+03: Moscow, Riyadh, Nairobi, Baghdad", v: "Europe/Moscow" },
        { n: "UTC+04: Dubai, Baku, Tbilisi, Mauritius", v: "Asia/Dubai" },
        { n: "UTC+05: Karachi, Tashkent, Maldives, Islamabad", v: "Asia/Karachi" },
        { n: "UTC+06: Dhaka, Almaty, Omsk, Thimphu", v: "Asia/Dhaka" },
        { n: "UTC+07: Hà Nội, TP.HCM, Bangkok, Jakarta", v: "Asia/Ho_Chi_Minh" },
        { n: "UTC+08: Singapore, Bắc Kinh, Perth, Manila", v: "Asia/Singapore" },
        { n: "UTC+09: Tokyo, Seoul, Osaka, Yakutsk", v: "Asia/Tokyo" },
        { n: "UTC+10: Sydney, Melbourne, Brisbane, Guam", v: "Australia/Sydney" },
        { n: "UTC+11: Noumea, Solomon Is., Vanuatu, Magadan", v: "Pacific/Noumea" },
        { n: "UTC+12: Auckland, Fiji, Marshall Is., Petropavlovsk", v: "Pacific/Auckland" }
    ];

    tzs.forEach(t => {
        let o = document.createElement('option');
        o.value = t.v; o.textContent = t.n;
        if(t.v === "Asia/Ho_Chi_Minh") o.selected = true;
        tzSelect.appendChild(o);
    });

    function update() {
        let tz = tzSelect.value; let now = new Date();
        document.getElementById('current-time').textContent = new Intl.DateTimeFormat('vi-VN', {timeZone:tz, hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false}).format(now);
        let p = new Intl.DateTimeFormat('vi-VN', {timeZone:tz, day:'2-digit', month:'2-digit', year:'numeric'}).formatToParts(now);
        document.getElementById('solar-date').textContent = `${p.find(x=>x.type==='day').value}/${p.find(x=>x.type==='month').value}/${p.find(x=>x.type==='year').value}`;
        let lunar = new Intl.DateTimeFormat('vi-VN-u-ca-chinese', {timeZone:tz, day:'2-digit', month:'2-digit'}).format(now);
        document.getElementById('lunar-date').textContent = `Âm lịch: Ngày ${lunar.replace('/', ' tháng ')}`;
    }
    setInterval(update, 1000); update();

    function switchTab(i) {
        document.getElementById('slider').style.transform = `translateX(-${i * 33.3333}%)`;
        document.querySelectorAll('.tab-btn').forEach((b,idx) => b.classList.toggle('active', idx===i));
    }

    // Logic Bấm giờ & Hẹn giờ rút gọn để không lỗi
    let swT = 0, swI, isSw = false;
    document.getElementById('sw-start').onclick = function() {
        if(!isSw) { isSw=true; this.textContent="Dừng"; swI=setInterval(()=>{swT++; document.getElementById('sw-display').textContent=(swT/10).toFixed(1)},100); }
        else { isSw=false; this.textContent="Tiếp tục"; clearInterval(swI); }
    };
    document.getElementById('sw-reset').onclick = () => { clearInterval(swI); swT=0; isSw=false; document.getElementById('sw-display').textContent="00:00:00.0"; document.getElementById('sw-start').textContent="Bắt đầu"; };

    let tmT = 0, tmI, isTm = false;
    window.addTime = (s) => { tmT+=s; document.getElementById('tm-display').textContent = new Date(tmT*1000).toISOString().substr(11,8); };
    document.getElementById('tm-start').onclick = function() {
        if(tmT<=0) return;
        if(!isTm) { isTm=true; tmI=setInterval(()=>{tmT--; document.getElementById('tm-display').textContent=new Date(tmT*1000).toISOString().substr(11,8); if(tmT<=0){clearInterval(tmI); alert("Hết giờ!"); isTm=false;}},1000); }
        else { isTm=false; clearInterval(tmI); }
    };
    window.resetTimer = () => { clearInterval(tmI); tmT=0; isTm=false; document.getElementById('tm-display').textContent="00:00:00"; };
</script>
</body>
</html>
