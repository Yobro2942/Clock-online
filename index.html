<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Đồng Hồ Đa Năng Toàn Cầu</title>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        
        body {
            background: #000 url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2000') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; /* Chặn toàn bộ cuộn trang ngoài */
        }

        /* Khung chứa chính - Khắc phục lỗi tràn ở ảnh 1468 */
        .app-card {
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            width: 90%;
            max-width: 380px;
            height: 550px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: relative;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        /* Thanh điều hướng */
        .nav {
            display: flex;
            background: #222;
            border-radius: 15px;
            padding: 5px;
            margin-bottom: 20px;
        }
        .nav-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: none;
            color: #888;
            font-weight: bold;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .nav-btn.active {
            background: #00d2ff;
            color: #000;
            border-radius: 10px;
        }

        /* Vùng hiển thị nội dung */
        .content-area {
            flex: 1;
            position: relative;
            overflow: hidden; /* Quan trọng: để không bị tràn nội dung con */
        }

        .slider {
            display: flex;
            width: 300%;
            height: 100%;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .page {
            width: 33.333%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 10px;
        }

        /* Múi giờ & Đồng hồ */
        select {
            width: 100%;
            padding: 12px;
            background: #333;
            color: #fff;
            border: 1px solid #444;
            border-radius: 12px;
            font-size: 0.8rem;
            margin-bottom: 20px;
        }

        .time { font-size: 3.2rem; font-weight: bold; color: #00d2ff; margin: 15px 0; }
        .date { font-size: 1.1rem; color: #fff; margin-bottom: 10px; }
        .lunar { font-size: 0.9rem; color: #ffd700; background: rgba(255,215,0,0.1); padding: 5px 15px; border-radius: 20px; }

        /* Bấm giờ & Hẹn giờ */
        .display {
            background: rgba(255,255,255,0.05);
            width: 100%;
            padding: 30px 0;
            border-radius: 20px;
            font-size: 2.4rem;
            text-align: center;
            font-family: monospace;
            margin-bottom: 20px;
            color: #fff;
        }

        .btn-row { display: flex; gap: 10px; width: 100%; justify-content: center; }
        
        .btn {
            padding: 15px 20px;
            border-radius: 15px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            flex: 1;
            max-width: 120px;
        }

        .lap-box {
            width: 100%;
            margin-top: 15px;
            overflow-y: auto;
            max-height: 120px;
            font-size: 0.8rem;
        }
        .lap-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #222; color: #aaa; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="nav">
        <button class="nav-btn active" onclick="go(0)">Đồng Hồ</button>
        <button class="nav-btn" onclick="go(1)">Bấm Giờ</button>
        <button class="nav-btn" onclick="go(2)">Hẹn Giờ</button>
    </div>

    <div class="content-area">
        <div class="slider" id="slider">
            <div class="page">
                <select id="tz"></select>
                <div class="time" id="t">00:00:00</div>
                <div class="date" id="d">--/--/----</div>
                <div class="lunar" id="l">Đang tính...</div>
            </div>

            <div class="page">
                <div class="display" id="sw-d">00:00.0</div>
                <div class="btn-row">
                    <button class="btn" id="sw-s" style="background:#00ff88; color:#000;">Bắt đầu</button>
                    <button class="btn" id="sw-r" style="background:#ff4444; color:#fff;">Xóa</button>
                </div>
                <div class="lap-box" id="laps"></div>
            </div>

            <div class="page">
                <div class="display" id="tm-d">00:00:00</div>
                <div class="btn-row" style="margin-bottom:10px;">
                    <button class="btn" onclick="add(60)" style="background:#444; color:#fff;">+1 Phút</button>
                    <button class="btn" onclick="add(300)" style="background:#444; color:#fff;">+5 Phút</button>
                </div>
                <div class="btn-row">
                    <button class="btn" id="tm-s" style="background:#00d2ff; color:#000; max-width: 100%;">Bắt đầu / Dừng</button>
                    <button class="btn" onclick="resetT()" style="background:#ff4444; color:#fff;">Xóa</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Danh sách múi giờ siêu đầy đủ (Ít nhất 3 địa danh mỗi dòng)
    const zones = [
        { n: "UTC-12: Baker, Howland, Phoenix Is.", v: "Etc/GMT+12" },
        { n: "UTC-11: Samoa, Niue, Midway Is.", v: "Pacific/Pago_Pago" },
        { n: "UTC-10: Hawaii, Tahiti, Cook Is.", v: "Pacific/Honolulu" },
        { n: "UTC-09: Alaska, Gambier, Anchorage", v: "America/Anchorage" },
        { n: "UTC-08: LA, Vancouver, Tijuana", v: "America/Los_Angeles" },
        { n: "UTC-07: Denver, Edmonton, Phoenix", v: "America/Denver" },
        { n: "UTC-06: Mexico City, Chicago, Guatemala", v: "America/Mexico_City" },
        { n: "UTC-05: New York, Toronto, Havana", v: "America/New_York" },
        { n: "UTC-04: Santiago, Manaus, Halifax", v: "America/Santiago" },
        { n: "UTC-03: Sao Paulo, Buenos Aires, Greenland", v: "America/Sao_Paulo" },
        { n: "UTC-02: South Georgia, Sandwich Is.", v: "Etc/GMT+2" },
        { n: "UTC-01: Azores, Cape Verde, Praia", v: "Atlantic/Azores" },
        { n: "UTC+00: London, Dublin, Lisbon, Casablanca", v: "Europe/London" },
        { n: "UTC+01: Paris, Berlin, Rome, Madrid", v: "Europe/Paris" },
        { n: "UTC+02: Cairo, Athens, Johannesburg", v: "Africa/Cairo" },
        { n: "UTC+03: Moscow, Riyadh, Nairobi, Baghdad", v: "Europe/Moscow" },
        { n: "UTC+04: Dubai, Baku, Tbilisi, Mauritius", v: "Asia/Dubai" },
        { n: "UTC+05: Karachi, Tashkent, Maldives", v: "Asia/Karachi" },
        { n: "UTC+06: Dhaka, Almaty, Omsk, Thimphu", v: "Asia/Dhaka" },
        { n: "UTC+07: Hà Nội, TP.HCM, Bangkok, Jakarta", v: "Asia/Ho_Chi_Minh" },
        { n: "UTC+08: Singapore, Bắc Kinh, Perth, Manila", v: "Asia/Singapore" },
        { n: "UTC+09: Tokyo, Seoul, Osaka, Yakutsk", v: "Asia/Tokyo" },
        { n: "UTC+10: Sydney, Melbourne, Brisbane, Guam", v: "Australia/Sydney" },
        { n: "UTC+11: Noumea, Solomon Is., Vanuatu", v: "Pacific/Noumea" },
        { n: "UTC+12: Auckland, Fiji, Marshall Is.", v: "Pacific/Auckland" }
    ];

    const sel = document.getElementById('tz');
    zones.forEach(z => {
        let o = document.createElement('option');
        o.value = z.v; o.textContent = z.n;
        if(z.v === "Asia/Ho_Chi_Minh") o.selected = true;
        sel.appendChild(o);
    });

    function tick() {
        let z = sel.value, now = new Date();
        document.getElementById('t').textContent = new Intl.DateTimeFormat('vi-VN', {timeZone:z, hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false}).format(now);
        let p = new Intl.DateTimeFormat('vi-VN', {timeZone:z, day:'2-digit', month:'2-digit', year:'numeric'}).formatToParts(now);
        document.getElementById('d').textContent = `${p.find(x=>x.type==='day').value}/${p.find(x=>x.type==='month').value}/${p.find(x=>x.type==='year').value}`;
        let lunar = new Intl.DateTimeFormat('vi-VN-u-ca-chinese', {timeZone:z, day:'2-digit', month:'2-digit'}).format(now);
        document.getElementById('l').textContent = `Âm lịch: Ngày ${lunar.replace('/', ' tháng ')}`;
    }
    setInterval(tick, 1000); tick();

    function go(i) {
        document.getElementById('slider').style.transform = `translateX(-${i * 33.333}%)`;
        document.querySelectorAll('.nav-btn').forEach((b,idx) => b.classList.toggle('active', idx===i));
    }

    // Stopwatch
    let sT = 0, sI, isS = false;
    document.getElementById('sw-s').onclick = function() {
        if(!isS) { isS=true; this.textContent="Dừng"; sI=setInterval(()=>{sT++; document.getElementById('sw-d').textContent=(sT/10).toFixed(1)},100); }
        else { isS=false; this.textContent="Tiếp tục"; clearInterval(sI); }
    };
    document.getElementById('sw-r').onclick = () => { clearInterval(sI); sT=0; isS=false; document.getElementById('sw-d').textContent="00:00.0"; document.getElementById('sw-s').textContent="Bắt đầu"; };

    // Timer
    let tT = 0, tI, isT = false;
    window.add = (s) => { tT+=s; document.getElementById('tm-d').textContent = new Date(tT*1000).toISOString().substr(11,8); };
    document.getElementById('tm-s').onclick = function() {
        if(tT<=0) return;
        if(!isT) { isT=true; tI=setInterval(()=>{tT--; document.getElementById('tm-d').textContent=new Date(tT*1000).toISOString().substr(11,8); if(tT<=0){clearInterval(tI); alert("Hết giờ!"); isT=false;}},1000); }
        else { isT=false; clearInterval(tI); }
    };
    window.resetT = () => { clearInterval(tI); tT=0; isT=false; document.getElementById('tm-d').textContent="00:00:00"; };
</script>
</body>
</html>
