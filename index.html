<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Earth Clock Pro Max - 2026</title>
    
    <style>
        /* --- PHẦN 1: FONT HỆ THỐNG & BIẾN GIAO DIỆN --- */
        :root {
            --phone-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --neon-cyan: #00d2ff;
            --glass: rgba(0, 0, 0, 0.75);
            --app-height: 100dvh;
        }

        * { 
            box-sizing: border-box; margin: 0; padding: 0; 
            font-family: var(--phone-font);
            -webkit-font-smoothing: antialiased;
            user-select: none;
        }

        /* --- PHẦN 2: HÌNH NỀN TRÁI ĐẤT (STUNNING EARTH BACKGROUND) --- */
        html, body {
            width: 100vw; height: var(--app-height);
            overflow: hidden; background: #000;
            position: fixed; display: flex;
            justify-content: center; align-items: center;
        }

        .earth-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            /* Sử dụng ảnh Trái Đất từ không gian làm hình nền chính */
            background: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop') no-repeat center center;
            background-size: cover;
            z-index: -1;
            filter: brightness(0.6); /* Làm tối nền để nổi bật chữ */
        }

        /* --- PHẦN 3: KHUNG KÍNH MỜ (GLASSMORPHISM) --- */
        .app-core {
            position: relative;
            width: 92vw; max-width: 400px;
            height: calc(var(--app-height) - 120px);
            max-height: 750px;
            background: var(--glass);
            backdrop-filter: blur(25px); /* Hiệu ứng kính mờ xịn sò */
            -webkit-backdrop-filter: blur(25px);
            border-radius: 45px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex; flex-direction: column;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        /* Navigation Tabs */
        .nav-tabs { padding: 30px 20px 10px; flex-shrink: 0; }
        .tab-wrapper {
            display: flex; background: rgba(255, 255, 255, 0.05);
            border-radius: 20px; padding: 4px; gap: 4px;
        }
        .tab {
            flex: 1; padding: 12px 0; border: none; background: transparent;
            color: #666; font-weight: 800; font-size: 10px;
            text-transform: uppercase; letter-spacing: 1px;
            transition: 0.3s;
        }
        .tab.active {
            background: var(--neon-cyan); color: #000;
            border-radius: 16px; box-shadow: 0 5px 15px rgba(0, 210, 255, 0.3);
        }

        /* Timezone Dropdown - ĐÃ FIX */
        .selector-container { padding: 10px 25px; }
        .tz-select {
            width: 100%; padding: 16px; background: rgba(255,255,255,0.05);
            color: #fff; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px; font-size: 13.5px; outline: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 15px center;
        }

        /* Main Clock Area */
        .main-display {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }
        .time-txt {
            font-size: 4.5rem; font-weight: 900; color: #fff;
            line-height: 0.9; margin-bottom: 15px;
            letter-spacing: -2px; font-variant-numeric: tabular-nums;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
        .date-txt { font-size: 1.2rem; color: #aaa; font-weight: 600; }
        .lunar-chip {
            margin-top: 30px; background: rgba(0, 210, 255, 0.1);
            border: 1px solid rgba(0, 210, 255, 0.3);
            color: var(--neon-cyan); padding: 8px 25px;
            border-radius: 30px; font-weight: 700; font-size: 0.9rem;
        }

        /* Footer Info */
        .footer-info {
            padding: 20px; text-align: center; font-size: 10px;
            color: #444; text-transform: uppercase; letter-spacing: 2px;
            font-weight: 800; border-top: 1px solid rgba(255,255,255,0.03);
        }
    </style>
</head>
<body>

<div class="earth-bg"></div>

<div class="app-core">
    <header class="nav-tabs">
        <div class="tab-wrapper">
            <button class="tab active">Đồng Hồ</button>
            <button class="tab">Bấm Giờ</button>
            <button class="tab">Hẹn Giờ</button>
        </div>
    </header>

    <div class="selector-container">
        <select class="tz-select" id="cityList">
            <optgroup label="Tây Bán Cầu">
                <option value="Pacific/Honolulu">UTC-10: Hawaii, Tahiti</option>
                <option value="America/Anchorage">UTC-09: Alaska</option>
                <option value="America/Los_Angeles">UTC-08: LA, Vancouver, Tijuana</option>
                <option value="America/New_York">UTC-05: New York, Toronto, Miami</option>
                <option value="America/Sao_Paulo">UTC-03: Sao Paulo, Buenos Aires</option>
                <option value="Atlantic/South_Georgia">UTC-02: South Georgia (Đã fix)</option>
            </optgroup>
            
            <optgroup label="Gốc & Châu Âu">
                <option value="UTC">UTC+00: London, Dublin, Lisbon</option>
                <option value="Europe/Paris">UTC+01: Paris, Berlin, Rome, Madrid</option>
                <option value="Africa/Cairo">UTC+02: Cairo, Johannesburg, Kyiv</option>
                <option value="Europe/Moscow">UTC+03: Moscow, Riyadh, Nairobi</option>
            </optgroup>

            <optgroup label="Châu Á & Thái Bình Dương">
                <option value="Asia/Kolkata">UTC+05:30: Mumbai, Delhi</option>
                <option value="Asia/Ho_Chi_Minh" selected>UTC+07: Hà Nội, TP.HCM, Bangkok, Jakarta</option>
                <option value="Asia/Singapore">UTC+08: Singapore, Bắc Kinh, Manila, Perth</option>
                <option value="Asia/Tokyo">UTC+09: Tokyo, Seoul, Osaka</option>
                <option value="Australia/Sydney">UTC+10: Sydney, Melbourne, Brisbane</option>
                <option value="Pacific/Auckland">UTC+12: Auckland, Fiji</option>
                <option value="Pacific/Kiritimati">UTC+14: Kiribati (Christmas Is.)</option>
            </optgroup>
        </select>
    </div>

    <main class="main-display">
        <div class="time-txt" id="clock">00:00:00</div>
        <div class="date-txt" id="date">Chủ Nhật, 08/03/2026</div>
        <div class="lunar-chip" id="lunar">Âm lịch: Đang tính...</div>
    </main>

    <footer class="footer-info">
        HCMC • JUNE 2026 TRIP AHEAD • 14TH BIRTHDAY
    </footer>
</div>

<script>
    function updateSystem() {
        const picker = document.getElementById('cityList');
        
        setInterval(() => {
            const now = new Date();
            const zone = picker.value;
            
            // Cập nhật Giờ (Font hệ thống xịn)
            document.getElementById('clock').textContent = new Intl.DateTimeFormat('vi-VN', {
                timeZone: zone, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
            }).format(now);

            // Cập nhật Ngày
            const day = new Intl.DateTimeFormat('vi-VN', { timeZone: zone, weekday: 'long' }).format(now);
            const fullDate = new Intl.DateTimeFormat('vi-VN', { timeZone: zone, day: '2-digit', month: '2-digit', year: 'numeric' }).format(now);
            document.getElementById('date').textContent = `${day}, ${fullDate}`;

            // Cập nhật Âm lịch
            const lunar = new Intl.DateTimeFormat('vi-VN-u-ca-chinese', { 
                timeZone: zone, day: '2-digit', month: '2-digit' 
            }).format(now);
            document.getElementById('lunar').textContent = `Âm lịch: Ngày ${lunar.replace('/', ' tháng ')}`;
        }, 1000);
    }

    window.onload = updateSystem;
</script>
</body>
</html>
