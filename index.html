<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Đồng Hồ Đa Năng</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: url('https://images.unsplash.com/photo-1514316454349-750a7fd3da3a?q=80&w=2000&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            overflow: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            padding: 25px 15px;
            width: 95%;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        /* Thanh điều hướng Tabs */
        .nav-tabs {
            display: flex;
            justify-content: space-around;
            margin-bottom: 25px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            padding: 5px;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .tab-btn.active {
            background: rgba(255, 255, 255, 0.25);
            color: #ffeb3b;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        /* Vùng chứa các mục trượt */
        .slider-wrapper {
            display: flex;
            width: 300%; 
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .section {
            width: 33.3333%;
            padding: 0 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            font-size: 1.1rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ffeb3b;
        }

        /* Đồng hồ & Múi giờ */
        .tz-selector {
            margin-bottom: 20px;
        }
        select {
            padding: 8px 15px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            outline: none;
        }

        .clock-display {
            text-align: center;
        }
        .time-main {
            font-size: 3.5rem;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .date-main {
            font-size: 1.3rem;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .lunar-date {
            font-size: 1rem;
            color: #ffd54f;
            background: rgba(0,0,0,0.2);
            padding: 5px 15px;
            border-radius: 20px;
        }

        /* Nút bấm chung */
        .action-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
            margin: 5px;
        }
        .action-btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.3);
        }

        /* Bấm giờ & Hẹn giờ */
        .display-box {
            font-size: 2.5rem;
            font-family: 'Courier New', Courier, monospace;
            margin: 20px 0;
            background: rgba(0,0,0,0.2);
            padding: 10px 20px;
            border-radius: 15px;
        }

        .lap-list {
            list-style: none;
            max-height: 150px;
            width: 100%;
            overflow-y: auto;
            margin-top: 15px;
            background: rgba(0,0,0,0.15);
            border-radius: 12px;
            padding: 10px;
        }
        .lap-list li {
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 8px 0;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
        }

        /* Điều khiển Hẹn giờ */
        .timer-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .timer-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .timer-unit span { font-size: 0.7rem; margin-bottom: 5px; opacity: 0.8; }
        .val {
            font-size: 1.5rem;
            font-weight: bold;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 10px;
            min-width: 50px;
            text-align: center;
        }
        .arrow-btn {
            background: none;
            border: none;
            color: #ffeb3b;
            font-size: 1.2rem;
            padding: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab(0)">Đồng Hồ</button>
        <button class="tab-btn" onclick="switchTab(1)">Bấm Giờ</button>
        <button class="tab-btn" onclick="switchTab(2)">Hẹn Giờ</button>
    </div>

    <div class="slider-wrapper" id="slider">
        <div class="section">
            <div class="tz-selector">
                <select id="tz-select"></select>
            </div>
            <div class="clock-display">
                <div class="time-main" id="current-time">00:00:00</div>
                <div class="date-main" id="solar-date">--/--/----</div>
                <div class="lunar-date" id="lunar-date">Đang tính...</div>
            </div>
        </div>

        <div class="section">
            <h2>Bấm Giờ</h2>
            <div class="display-box" id="sw-display">00:00:00:00</div>
            <div>
                <button class="action-btn" id="sw-start">Bắt đầu</button>
                <button class="action-btn" id="sw-lap">Vòng</button>
                <button class="action-btn" id="sw-reset">Xóa</button>
            </div>
            <ul class="lap-list" id="lap-list"></ul>
        </div>

        <div class="section">
            <h2>Hẹn Giờ</h2>
            <div class="timer-controls">
                <div class="timer-unit">
                    <button class="arrow-btn" onclick="adjTimer('h', 1)">▲</button>
                    <div class="val" id="tm-h">00</div>
                    <button class="arrow-btn" onclick="adjTimer('h', -1)">▼</button>
                    <span>GIỜ</span>
                </div>
                <div class="timer-unit">
                    <button class="arrow-btn" onclick="adjTimer('m', 1)">▲</button>
                    <div class="val" id="tm-m">00</div>
                    <button class="arrow-btn" onclick="adjTimer('m', -1)">▼</button>
                    <span>PHÚT</span>
                </div>
                <div class="timer-unit">
                    <button class="arrow-btn" onclick="adjTimer('s', 1)">▲</button>
                    <div class="val" id="tm-s">00</div>
                    <button class="arrow-btn" onclick="adjTimer('s', -1)">▼</button>
                    <span>GIÂY</span>
                </div>
            </div>
            <div>
                <button class="action-btn" id="tm-start">Bắt đầu / Dừng</button>
                <button class="action-btn" id="tm-reset">Đặt lại</button>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. CHUYỂN TAB MƯỢT MÀ
    function switchTab(index) {
        document.getElementById('slider').style.transform = `translateX(-${index * 33.3333}%)`;
        const tabs = document.querySelectorAll('.tab-btn');
        tabs.forEach((t, i) => t.classList.toggle('active', i === index));
    }

    // 2. ĐỒNG HỒ & ĐỊNH DẠNG NGÀY dd/mm/yyyy
    const tzSelect = document.getElementById('tz-select');
    for (let i = -12; i <= 12; i++) {
        const opt = document.createElement('option');
        const offset = i >= 0 ? `+${i}` : i;
        opt.value = i === 0 ? 'UTC' : `Etc/GMT${i > 0 ? '-' : '+'}${Math.abs(i)}`;
        opt.textContent = `Múi giờ UTC ${offset}`;
        if (i === 7) opt.selected = true;
        tzSelect.appendChild(opt);
    }

    function updateClock() {
        const tz = tzSelect.value;
        const now = new Date();

        // Giờ
        document.getElementById('current-time').textContent = new Intl.DateTimeFormat('vi-VN', {
            timeZone: tz, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
        }).format(now);

        // Dương lịch: dd/mm/yyyy
        const parts = new Intl.DateTimeFormat('vi-VN', {
            timeZone: tz, day: '2-digit', month: '2-digit', year: 'numeric'
        }).formatToParts(now);
        const d = parts.find(p => p.type === 'day').value;
        const m = parts.find(p => p.type === 'month').value;
        const y = parts.find(p => p.type === 'year').value;
        document.getElementById('solar-date').textContent = `${d}/${m}/${y}`;

        // Âm lịch
        const lunar = new Intl.DateTimeFormat('vi-VN-u-ca-chinese', {
            timeZone: tz, day: '2-digit', month: '2-digit'
        }).format(now);
        document.getElementById('lunar-date').textContent = `Âm lịch: Ngày ${lunar.replace('/', ' tháng ')}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // 3. BẤM GIỜ
    let swTime = 0, swInt, isSw = false;
    const swStartBtn = document.getElementById('sw-start');
    
    function fmt(cs) {
        const h = Math.floor(cs/360000), m = Math.floor((cs%360000)/6000), s = Math.floor((cs%6000)/100), ms = cs%100;
        return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}:${String(ms).padStart(2,'0')}`;
    }

    swStartBtn.onclick = () => {
        if(!isSw) {
            isSw = true; swStartBtn.textContent = "Dừng";
            swInt = setInterval(() => { swTime++; document.getElementById('sw-display').textContent = fmt(swTime); }, 10);
        } else {
            isSw = false; swStartBtn.textContent = "Tiếp tục"; clearInterval(swInt);
        }
    };

    document.getElementById('sw-lap').onclick = () => {
        if(isSw) {
            const li = document.createElement('li');
            li.innerHTML = `<span>Vòng ${document.getElementById('lap-list').children.length + 1}</span> <span>${fmt(swTime)}</span>`;
            document.getElementById('lap-list').prepend(li);
        }
    };

    document.getElementById('sw-reset').onclick = () => {
        clearInterval(swInt); isSw = false; swTime = 0;
        document.getElementById('sw-display').textContent = "00:00:00:00";
        swStartBtn.textContent = "Bắt đầu"; document.getElementById('lap-list').innerHTML = '';
    };

    // 4. HẸN GIỜ
    let tm = { h:0, m:0, s:0 }, tmInt, isTm = false;
    function upTm() {
        document.getElementById('tm-h').textContent = String(tm.h).padStart(2,'0');
        document.getElementById('tm-m').textContent = String(tm.m).padStart(2,'0');
        document.getElementById('tm-s').textContent = String(tm.s).padStart(2,'0');
    }

    window.adjTimer = (u, a) => {
        if(isTm) return;
        tm[u] += a;
        if(tm[u] < 0) tm[u] = 0;
        if(tm.m > 59) tm.m = 0; if(tm.s > 59) tm.s = 0;
        upTm();
    };

    document.getElementById('tm-start').onclick = () => {
        if(!isTm) {
            let total = tm.h*3600 + tm.m*60 + tm.s;
            if(total <= 0) return;
            isTm = true;
            tmInt = setInterval(() => {
                total--;
                tm.h = Math.floor(total/3600); tm.m = Math.floor((total%3600)/60); tm.s = total%60;
                upTm();
                if(total <= 0) { clearInterval(tmInt); isTm = false; alert("Hết giờ!"); }
            }, 1000);
        } else {
            isTm = false; clearInterval(tmInt);
        }
    };

    document.getElementById('tm-reset').onclick = () => {
        clearInterval(tmInt); isTm = false; tm = {h:0, m:0, s:0}; upTm();
    };
</script>
</body>
</html>
