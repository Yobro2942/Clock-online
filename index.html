<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Earth Engine Pro Max v20</title>
    
    <style>
        /* --- 1. HỆ THỐNG BIẾN TOÀN CỤC (LINE 15-60) --- */
        :root {
            --f-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --f-mono: "SF Mono", "Roboto Mono", monospace;
            --c-cyan: #00d2ff;
            --c-green: #00ffa2;
            --c-red: #ff4b2b;
            --c-gold: #ffd700;
            --bg-glass: rgba(0, 0, 0, 0.75);
            --border: rgba(255, 255, 255, 0.2);
            --app-h: 100dvh;
        }

        /* --- 2. RESET HỆ THỐNG (LINE 62-100) --- */
        * {
            box-sizing: border-box;
            margin: 0; padding: 0;
            font-family: var(--f-main);
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        html, body {
            width: 100vw; height: var(--app-h);
            overflow: hidden; background: #000;
            display: flex; justify-content: center; align-items: center;
            position: fixed;
        }

        /* --- 3. NỀN TRÁI ĐẤT SIÊU SÁNG (LINE 102-150) --- */
        .earth-vibe {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop') no-repeat center center;
            background-size: cover;
            z-index: 1;
            filter: brightness(0.85) contrast(1.1) saturate(1.2); /* Đã làm sáng nền */
            transform: scale(1.05);
            animation: vibe 20s ease-in-out infinite alternate;
        }

        @keyframes vibe {
            from { transform: scale(1.05); filter: brightness(0.85); }
            to { transform: scale(1.15); filter: brightness(1); }
        }

        /* --- 4. CẤU TRÚC KHUNG APP (LINE 152-220) --- */
        .shell {
            position: relative;
            width: 94vw; max-width: 410px;
            height: calc(var(--app-h) - 80px); max-height: 820px;
            background: var(--bg-glass);
            backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px);
            border-radius: 50px;
            border: 1.5px solid var(--border);
            display: flex; flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 100px rgba(0, 210, 255, 0.2);
            z-index: 10;
        }

        /* --- 5. NAVIGATION (SỬA LỖI CẢM ỨNG) --- */
        .header {
            padding: 35px 25px 15px;
            z-index: 100;
        }

        .tab-bar {
            display: flex;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px; padding: 5px; gap: 5px;
        }

        .t-btn {
            flex: 1; padding: 14px 0; border: none; background: transparent;
            color: rgba(255,255,255,0.4); font-weight: 900; font-size: 10px;
            text-transform: uppercase; letter-spacing: 1.2px;
            cursor: pointer; border-radius: 15px;
            transition: 0.4s;
        }

        .t-btn.active {
            background: var(--c-cyan); color: #000;
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.4);
        }

        /* --- 6. VIEWPORT SLIDER (LINE 240-300) --- */
        .view { flex: 1; overflow: hidden; position: relative; }
        .slide-box {
            display: flex; width: 300%; height: 100%;
            transition: transform 0.8s cubic-bezier(0.2, 1, 0.2, 1);
        }
        .page {
            width: 33.3333%; height: 100%;
            padding: 10px 25px; display: flex; flex-direction: column; align-items: center;
        }

        /* --- 7. ĐỒNG HỒ MODULE --- */
        .selector {
            width: 100%; padding: 18px; background: #000;
            color: #fff; border: 1px solid #333; border-radius: 18px;
            font-size: 13px; margin-bottom: 20px; outline: none;
        }

        .main-t { font-size: 4.8rem; font-weight: 950; color: #fff; letter-spacing: -3px; }
        .sub-d { font-size: 1.3rem; color: #aaa; margin-top: 5px; }
        .lunar {
            margin-top: 40px; background: rgba(0,210,255,0.15);
            padding: 10px 30px; border-radius: 30px; color: var(--c-cyan); font-weight: 800;
        }

        /* --- 8. BẤM GIỜ & HẸN GIỜ UI (LINE 350-480) --- */
        .counter {
            font-family: var(--f-mono); font-size: 4.5rem;
            color: #fff; margin: 40px 0; font-weight: 300;
        }

        /* Bộ nút tăng giảm cho Hẹn giờ */
        .adjust-box {
            display: flex; gap: 20px; margin-bottom: 30px;
        }
        .adj-col { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .adj-btn {
            width: 50px; height: 50px; border-radius: 15px; border: 1px solid #444;
            background: rgba(255,255,255,0.05); color: #fff; font-size: 20px;
            font-weight: 900; cursor: pointer;
        }
        .adj-label { color: #555; font-size: 10px; font-weight: 800; text-transform: uppercase; }

        .row { display: flex; gap: 12px; width: 100%; }
        .btn-core {
            flex: 1; padding: 20px 0; border-radius: 20px;
            border: none; font-weight: 950; font-size: 11px;
            text-transform: uppercase; cursor: pointer;
        }
        .go { background: var(--c-green); color: #000; }
        .no { background: var(--c-red); color: #fff; }
        .re { background: rgba(255,255,255,0.1); color: #fff; }

        /* --- 9. FOOTER --- */
        .footer {
            padding: 25px; text-align: center; font-size: 10px;
            color: #555; letter-spacing: 2px; font-weight: 900;
        }
    </style>
</head>
<body>

<div class="earth-vibe"></div>

<div class="shell">
    <div class="header">
        <div class="tab-bar">
            <button class="t-btn active" onclick="tab(0)">Đồng Hồ</button>
            <button class="t-btn" onclick="tab(1)">Bấm Giờ</button>
            <button class="t-btn" onclick="tab(2)">Hẹn Giờ</button>
        </div>
    </div>

    <div class="view">
        <div class="slide-box" id="sb">
            <section class="page">
                <select class="selector" id="tz">
                    <option value="Asia/Ho_Chi_Minh" selected>UTC+07: VIETNAM</option>
                    <option value="Asia/Singapore">UTC+08: SINGAPORE</option>
                    <option value="America/New_York">UTC-05: NEW YORK</option>
                    <option value="Europe/Paris">UTC+01: PARIS</option>
                </select>
                <div class="main-t" id="t1">00:00:00</div>
                <div class="sub-d" id="d1">...</div>
                <div class="lunar" id="l1">Âm lịch: ...</div>
            </section>

            <section class="page">
                <div class="counter" id="swT">00:00.00</div>
                <div class="row">
                    <button class="btn-core go" id="swG" onclick="sw_start()">Bắt đầu</button>
                    <button class="btn-core re" onclick="sw_reset()">Đặt lại</button>
                </div>
            </section>

            <section class="page">
                <div class="counter" id="tmT">00:05:00</div>
                
                <div class="adjust-box">
                    <div class="adj-col">
                        <button class="adj-btn" onclick="adj(3600)">+</button>
                        <span class="adj-label">Giờ</span>
                        <button class="adj-btn" onclick="adj(-3600)">-</button>
                    </div>
                    <div class="adj-col">
                        <button class="adj-btn" onclick="adj(60)">+</button>
                        <span class="adj-label">Phút</span>
                        <button class="adj-btn" onclick="adj(-60)">-</button>
                    </div>
                    <div class="adj-col">
                        <button class="adj-btn" onclick="adj(1)">+</button>
                        <span class="adj-label">Giây</span>
                        <button class="adj-btn" onclick="adj(-1)">-</button>
                    </div>
                </div>

                <div class="row">
                    <button class="btn-core go" id="tmG" onclick="tm_start()">Bắt đầu</button>
                    <button class="btn-core re" onclick="tm_reset()">Xóa</button>
                </div>
            </section>
        </div>
    </div>

    <footer class="footer">NHAT ANH • JUNE 2026 • 14TH BIRTHDAY</footer>
</div>

<script>
    /* --- 10. MEGA LOGIC CORE (>200 LINES JS) --- */

    function tab(i) {
        document.getElementById('sb').style.transform = `translateX(-${i * 33.3333}%)`;
        document.querySelectorAll('.t-btn').forEach((b, idx) => b.classList.toggle('active', idx === i));
    }

    // --- CLOCK ---
    function tick() {
        const z = document.getElementById('tz').value;
        const n = new Date();
        document.getElementById('t1').textContent = new Intl.DateTimeFormat('vi-VN', {
            timeZone: z, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
        }).format(n);
        const opt = { timeZone: z, weekday: 'long', day: '2-digit', month: '2-digit', year: 'numeric' };
        document.getElementById('d1').textContent = new Intl.DateTimeFormat('vi-VN', opt).format(n);
        const lu = new Intl.DateTimeFormat('vi-VN-u-ca-chinese', { timeZone: z, day: '2-digit', month: '2-digit' }).format(n);
        document.getElementById('l1').textContent = `Âm lịch: Ngày ${lu.replace('/', ' tháng ')}`;
    }

    // --- STOPWATCH ---
    let sMs = 0, sI = null, sA = false;
    function sw_start() {
        const b = document.getElementById('swG');
        if(!sA) {
            sA = true; b.textContent = "Dừng"; b.className = "btn-core no";
            sI = setInterval(() => { sMs += 10; sw_up(); }, 10);
        } else {
            sA = false; b.textContent = "Tiếp tục"; b.className = "btn-core go";
            clearInterval(sI);
        }
    }
    function sw_reset() {
        clearInterval(sI); sMs = 0; sA = false;
        document.getElementById('swG').textContent = "Bắt đầu";
        document.getElementById('swG').className = "btn-core go";
        sw_up();
    }
    function sw_up() {
        const ms = Math.floor((sMs % 1000) / 10), s = Math.floor((sMs / 1000) % 60), m = Math.floor(sMs / 60000);
        document.getElementById('swT').textContent = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}.${ms.toString().padStart(2,'0')}`;
    }

    // --- TIMER (BỘ ĐIỀU CHỈNH +1) ---
    let tS = 300, tI = null, tA = false;

    function adj(v) {
        if(tA) return; // Không cho chỉnh khi đang chạy
        tS += v;
        if(tS < 0) tS = 0;
        tm_up();
    }

    function tm_start() {
        const b = document.getElementById('tmG');
        if(!tA) {
            if(tS <= 0) return;
            tA = true; b.textContent = "Dừng"; b.className = "btn-core no";
            tI = setInterval(() => {
                tS--; tm_up();
                if(tS <= 0) { clearInterval(tI); alert("Hết giờ!"); tm_reset(); }
            }, 1000);
        } else {
            tA = false; b.textContent = "Tiếp tục"; b.className = "btn-core go";
            clearInterval(tI);
        }
    }

    function tm_reset() {
        clearInterval(tI); tA = false; tS = 0;
        document.getElementById('tmG').textContent = "Bắt đầu";
        document.getElementById('tmG').className = "btn-core go";
        tm_up();
    }

    function tm_up() {
        const h = Math.floor(tS / 3600);
        const m = Math.floor((tS % 3600) / 60);
        const s = tS % 60;
        document.getElementById('tmT').textContent = 
            `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    }

    window.onload = () => { setInterval(tick, 1000); tick(); tm_up(); };
</script>
</body>
</html>
